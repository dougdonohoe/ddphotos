<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>404 - Not Found</title>
	<style>
		:root {
			--bg-color: #1a1a1a;
			--text-color: #f0f0f0;
			--text-muted: #999;
			--link-color: #88b4e7;
		}
		body {
			margin: 0;
			padding: 0;
			background-color: var(--bg-color);
			color: var(--text-color);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
		}
		main {
			max-width: 600px;
			margin: 4rem auto;
			padding: 2rem;
			text-align: center;
		}
		h1 {
			font-size: 4rem;
			margin: 0 0 1rem 0;
			color: var(--text-muted);
		}
		p {
			font-size: 1.25rem;
			margin: 0 0 2rem 0;
		}
		a {
			color: var(--link-color);
		}
	</style>
</head>
<body>
	<main>
		<h1>404</h1>
		<p>Page not found</p>
		<a href="/">Back to albums</a>
	</main>
</body>
</html>
